// CANVAS ENGINE: STAR DUST PARTICLES FUZZY IN HARMONIC OSCILLATIONS WAVE
// =========================================================================
const canvas = document.getElementById('starfieldCanvas');
const ctx = canvas.getContext('2d');

let dots = [];
const maxDots = 85;
let harmonicTime = 0;

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// Instantiation of Star Dust Entities
for (let i = 0; i < maxDots; i++) {
  dots.push({
    x: Math.random() * window.innerWidth,
    y: Math.random() * window.innerHeight,
    size: Math.random() * 2.2 + 0.6,
    speedY: Math.random() * 0.4 + 0.1,
    amplitude: Math.random() * 40 + 10,
    frequency: Math.random() * 0.02 + 0.005,
    phase: Math.random() * Math.PI * 2,
    brightness: Math.random() * 0.6 + 0.4
  });
}

function renderHarmonicWaves() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  harmonicTime += 0.015;

  dots.forEach(dot => {
    dot.y -= dot.speedY;
    if (dot.y < -10) {
      dot.y = canvas.height + 10;
      dot.x = Math.random() * canvas.width;
    }

    // Harmonic Wave function calculation for Star Dust particles lateral shift
    let lateralWave = Math.sin(harmonicTime * dot.frequency * 10 + dot.phase) * dot.amplitude * 0.05;
    let actualX = dot.x + lateralWave * Math.cos(dot.phase);

    ctx.beginPath();
    ctx.arc(actualX, dot.y, dot.size, 0, Math.PI * 2);
    // Deep Golden Dust Particle Emissive Glow
    ctx.fillStyle = `rgba(255, 223, 0, ${dot.brightness * (0.3 + 0.4 * Math.sin(harmonicTime + dot.phase))})`;
    ctx.fill();
  });

  requestAnimationFrame(renderHarmonicWaves);
}

// =========================================================================
// INTERACTIVE HOLOGRAM UI CONTROLLER
// =========================================================================
const searchInput = document.getElementById('QuantumSearch');
const dropDown = document.getElementById('HintDropdown');
const panel = document.getElementById('DisplayPanel');
const target = document.getElementById('DynamicResultTarget');

// Autocomplete filter tracking matching names & IDs
searchInput.addEventListener('input', () => {
  const query = searchInput.value.trim().toLowerCase();
  if (!query) {
    dropDown.classList.remove('active');
    return;
  }

  const matches = database.filter(s => 
    s.name.toLowerCase().includes(query) || s.id.includes(query)
  );

  if (matches.length) {
    dropDown.innerHTML = matches.map(s => `
      <div class="hint-row" onclick="commitSelection('${s.name}')">
        <div class="meta-id">SYS_ID // ${s.id}</div>
        <div class="meta-name">${s.name}</div>
      </div>
    `).join('');
    dropDown.classList.add('active');
  } else {
    dropDown.classList.remove('active');
  }
});

// Close dropdown on external clicks
document.addEventListener('click', (e) => {
  if (!e.target.closest('.search-wrapper')) {
    dropDown.classList.remove('active');
  }
});

function commitSelection(name) {
  searchInput.value = name;
  dropDown.classList.remove('active');
  triggerQuantumMatch();
}

searchInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') triggerQuantumMatch();
});

function triggerQuantumMatch() {
  const val = searchInput.value.trim().toLowerCase();
  if (!val) {
    searchInput.focus();
    searchInput.style.borderColor = 'var(--neon-pink)';
    setTimeout(() => searchInput.style.borderColor = '', 1000);
    return;
  }
  dropDown.classList.remove('active');

  // Query engine locating dataset
  const targetStudent = database.find(s => 
    s.name.toLowerCase() === val ||
    s.name.replace(/\s+/g, '').toLowerCase() === val.replace(/\s+/g, '') ||
    s.id === val
  );

  panel.classList.add('active');

  if (!targetStudent) {
    target.innerHTML = `
      <div class="hud-error">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
        </svg>
        <div>
          <strong>ERROR // IDENTITY_NOT_FOUND</strong><br>
          <span style="opacity:0.75; font-size:12.5px;">ไม่พบข้อมูลนิสิตหรือรหัสระบุตัวตน "${searchInput.value}" ในฐานระบบคอร์โปรแกรม มติสัดส่วนภาคใต้ถูกระงับเนื่องจากไร้พิกัดเป้าหมาย</span>
        </div>
      </div>`;
    return;
  }

  // Render Core Profile with top matches structured inside 3D nodes
  let output = `
    <div class="profile-core">
      <div class="p-id">DATA RECORD // NO. ${targetStudent.id}</div>
      <div class="p-name">${targetStudent.name}</div>
      <div class="p-topic"><strong>หัวข้อวิทยานิพนธ์:</strong> ${targetStudent.topic}</div>
    </div>
    <div style="font-size:12px; font-weight:700; color:var(--neon-cyan); letter-spacing:1px; margin-bottom:15px; text-transform:uppercase;">>>> TOP 3 EXPERT ACADEMIC MATCHES DEPLOYED:</div>
  `;

  const nodeStyles = ['node-rank1', 'node-rank2', 'node-rank3'];
  const medals = ['🥇 CORE ADVISOR', '🥈 OPTIONAL CO-ADVISOR', '🥉 ASSOCIATE NODE'];

  output += targetStudent.matches.map((m, idx) => `
    <div class="node-card ${nodeStyles[idx]}">
      <div class="node-badge">${medals[idx]}</div>
      <div class="adv-name">${m.name}</div>
      <div class="adv-reason"><span>เกณฑ์พิจารณาเชิงวิชาการ:</span> ${m.reason}</div>
    </div>
  `).join('');

  target.innerHTML = output;
  panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}
</script>
